name: Frontend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
    frontend-test:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: frontend

        steps:

            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
               node-version: 24

            - name: Install dependencies
              run: npm install

            - name: Run frontend tests
              run: npm test

            


        

